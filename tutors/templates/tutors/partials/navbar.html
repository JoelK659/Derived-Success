<nav class="navbar navbar-light" style="background-color: #e3f2fd;">
  <div class="container-fluid">
    <!-- Brand and toggle get grouped for better mobile display -->
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="http://127.0.0.1:8000/">Derived Success</a>
    </div>

    <!-- Collect the nav links, forms, and other content for toggling -->
    <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">

        <li class="active"><a href="{% url 'home' %}">Home<span class="sr-only">(current)</span></a></li>
      </ul>
      <form class="navbar-form navbar-left">

          <div class="form-group">
            <input type="text" name="session_name" placeholder="Search for a session" class="form-control">
          </div>
          <button type="submit" class="btn btn-default">Search</button>
        {% else %}
          <div class="form-group">
            <input type="text" name="tutor_name" placeholder="Search for a tutor" class="form-control">

          <button type="submit" class="btn btn-default">Search</button>
